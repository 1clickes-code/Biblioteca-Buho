<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="100%" stop-color="#F5F0E8"/>
    </linearGradient>
    <linearGradient id="topBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="50%" stop-color="#B45309"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <radialGradient id="owlAura" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#D97706" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rightGlow" cx="80%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#D97706" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#rightGlow)"/>

  <!-- Amber top bar -->
  <rect x="0" y="0" width="1200" height="7" fill="url(#topBar)"/>

  <!-- Subtle grid dots -->
  <g opacity="0.07" fill="#B45309">
    <circle cx="80" cy="100" r="3"/><circle cx="160" cy="100" r="3"/><circle cx="240" cy="100" r="3"/>
    <circle cx="80" cy="180" r="3"/><circle cx="160" cy="180" r="3"/><circle cx="240" cy="180" r="3"/>
    <circle cx="80" cy="260" r="3"/><circle cx="160" cy="260" r="3"/><circle cx="240" cy="260" r="3"/>
    <circle cx="80" cy="340" r="3"/><circle cx="160" cy="340" r="3"/><circle cx="240" cy="340" r="3"/>
    <circle cx="80" cy="420" r="3"/><circle cx="160" cy="420" r="3"/><circle cx="240" cy="420" r="3"/>
    <circle cx="80" cy="500" r="3"/><circle cx="160" cy="500" r="3"/><circle cx="240" cy="500" r="3"/>
    <circle cx="80" cy="580" r="3"/><circle cx="160" cy="580" r="3"/><circle cx="240" cy="580" r="3"/>
    <circle cx="1020" cy="100" r="3"/><circle cx="1100" cy="100" r="3"/><circle cx="1020" cy="180" r="3"/>
    <circle cx="1100" cy="180" r="3"/><circle cx="1020" cy="260" r="3"/><circle cx="1100" cy="260" r="3"/>
    <circle cx="1020" cy="340" r="3"/><circle cx="1100" cy="340" r="3"/><circle cx="1020" cy="420" r="3"/>
    <circle cx="1100" cy="420" r="3"/><circle cx="1020" cy="500" r="3"/><circle cx="1100" cy="500" r="3"/>
    <circle cx="1020" cy="580" r="3"/><circle cx="1100" cy="580" r="3"/>
  </g>

  <!-- Left zone warm tint -->
  <rect x="0" y="0" width="360" height="630" fill="rgba(254,243,199,0.28)"/>
  <line x1="360" y1="40" x2="360" y2="590" stroke="rgba(180,83,9,0.12)" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- OWL — left zone centered -->
  <circle cx="180" cy="300" r="120" fill="url(#owlAura)"/>

  <!-- Body -->
  <ellipse cx="180" cy="340" rx="72" ry="80" fill="#B45309"/>
  <ellipse cx="180" cy="350" rx="46" ry="56" fill="#D97706" opacity="0.22"/>

  <!-- Head -->
  <circle cx="180" cy="238" r="68" fill="#B45309"/>

  <!-- Ear tufts -->
  <polygon points="146,182 132,148 158,174" fill="#92400E"/>
  <polygon points="214,182 228,148 202,174" fill="#92400E"/>

  <!-- Eyes -->
  <circle cx="158" cy="232" r="24" fill="#FEF3C7"/>
  <circle cx="202" cy="232" r="24" fill="#FEF3C7"/>
  <circle cx="158" cy="232" r="13" fill="#1C1917"/>
  <circle cx="202" cy="232" r="13" fill="#1C1917"/>
  <circle cx="163" cy="227" r="4.5" fill="white"/>
  <circle cx="207" cy="227" r="4.5" fill="white"/>

  <!-- Beak -->
  <polygon points="170,256 190,256 180,272" fill="#D97706"/>

  <!-- Wing left (holding book) -->
  <path d="M118,340 Q88,364 72,390" stroke="#92400E" stroke-width="16" stroke-linecap="round" fill="none"/>
  <g transform="rotate(-14, 54, 414)">
    <rect x="32" y="390" width="50" height="62" rx="3" fill="#292524"/>
    <rect x="32" y="390" width="9" height="62" rx="3" fill="#B45309"/>
    <rect x="37" y="390" width="45" height="62" rx="2" fill="#1C1917"/>
    <rect x="42" y="402" width="30" height="2" rx="1" fill="#D97706" opacity="0.6"/>
    <rect x="42" y="410" width="26" height="2" rx="1" fill="#6B6560" opacity="0.5"/>
    <rect x="42" y="418" width="28" height="2" rx="1" fill="#6B6560" opacity="0.5"/>
    <rect x="42" y="426" width="22" height="2" rx="1" fill="#6B6560" opacity="0.5"/>
  </g>

  <!-- Wing right (holding certificate) -->
  <path d="M242,322 Q268,302 276,286" stroke="#92400E" stroke-width="14" stroke-linecap="round" fill="none"/>
  <rect x="252" y="234" width="88" height="58" rx="4" fill="#FFFBEB"/>
  <rect x="252" y="234" width="88" height="58" rx="4" fill="none" stroke="#D97706" stroke-width="1.5"/>
  <rect x="252" y="234" width="88" height="12" rx="4" fill="rgba(217,119,6,0.28)"/>
  <rect x="258" y="256" width="68" height="2" rx="1" fill="#B0A89E"/>
  <rect x="258" y="264" width="56" height="2" rx="1" fill="#B0A89E"/>
  <rect x="258" y="272" width="62" height="2" rx="1" fill="#B0A89E"/>
  <circle cx="316" cy="286" r="10" fill="#D97706"/>
  <text x="316" y="290" font-size="9" text-anchor="middle" fill="white" font-weight="700" font-family="sans-serif">★</text>

  <!-- Feet -->
  <ellipse cx="162" cy="416" rx="18" ry="8" fill="#92400E"/>
  <ellipse cx="198" cy="416" rx="18" ry="8" fill="#92400E"/>

  <!-- RIGHT ZONE — Brand content -->
  <!-- Brand label -->
  <text x="460" y="198" font-family="'Courier New', monospace" font-size="22" font-weight="700" fill="#B45309" letter-spacing="3" opacity="0.9">alex.decode</text>

  <!-- Amber separator line -->
  <rect x="460" y="216" width="60" height="3" rx="2" fill="#B45309"/>

  <!-- Main headline -->
  <text font-family="Georgia, 'Times New Roman', serif" font-weight="700" fill="#1C1917" letter-spacing="-1">
    <tspan x="460" y="290" font-size="64">Biblioteca</tspan>
    <tspan x="460" y="360" font-size="64">de IA.</tspan>
  </text>

  <!-- Tagline -->
  <text x="460" y="410" font-family="Georgia, serif" font-size="26" fill="#78716C" font-style="italic">El camino que nadie te da.</text>

  <!-- Level pills -->
  <g font-family="'Courier New', monospace" font-size="14" font-weight="700" letter-spacing="1.5">
    <rect x="460" y="446" width="112" height="28" rx="14" fill="rgba(120,113,108,0.12)"/>
    <text x="516" y="464" text-anchor="middle" fill="#78716C">NIVEL 0</text>

    <rect x="584" y="446" width="112" height="28" rx="14" fill="rgba(5,150,105,0.10)"/>
    <text x="640" y="464" text-anchor="middle" fill="#059669">NIVEL 1</text>

    <rect x="708" y="446" width="112" height="28" rx="14" fill="rgba(37,99,235,0.10)"/>
    <text x="764" y="464" text-anchor="middle" fill="#2563EB">NIVEL 2</text>

    <rect x="832" y="446" width="112" height="28" rx="14" fill="rgba(124,58,237,0.10)"/>
    <text x="888" y="464" text-anchor="middle" fill="#7C3AED">NIVEL 3</text>
  </g>

  <!-- Stats bar -->
  <line x1="460" y1="508" x2="960" y2="508" stroke="#E8E2D9" stroke-width="1"/>
  <g font-family="'Courier New', monospace" font-size="16" fill="#78716C">
    <text x="460" y="538"><tspan font-weight="700" fill="#1C1917">20</tspan>  recursos</text>
    <text x="620" y="538"><tspan font-weight="700" fill="#1C1917">4</tspan>  niveles</text>
    <text x="740" y="538"><tspan font-weight="700" fill="#1C1917">100%</tspan>  gratuito</text>
  </g>

  <!-- Bottom border -->
  <rect x="0" y="623" width="1200" height="7" fill="url(#topBar)" opacity="0.4"/>
</svg>
